<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>JS Interno Básico</title>
</head>
<body>

    <form id="formularioLaboral">
        
<h1>Simulador de prestaciones laborales</h1>
<label for="nombre">Nombre:</label>
<input 
type="text"
id="nombre"
name="nombre"
minlength="1"
maxlength="100"
required>

<br><br>

<label for="edad">Edad:</label>
<input
type="number"
id="edad"
name="edad"
min="0"
max="120"
required>

<br><br>

<label for="tipoDocumento">Tipo de documento:</label>
<select id="tipoDocumento"
name="tipoDocumento"
required>
<option value="">selecciona el documento de identidad</option>
<option value="CC">CC</option>
<option value="TI">TI</option>
<option value="CE">CE</option>
<option value="PP">PP</option>
</select>

<br><br>

<label for="numeroDocumento">Numero de documento</label>
<input
type="text"
id="numeroDocumento"
name="numeroDocumento"
minlength="5"
maxlength="10"
required>

 <br><br>

 <label for="salario">Salario:</label>

<input
type="number"
id="salario"
name="salario"
min="0"
required>

 <br><br>

<label for="comisiones">Comisiones:</label>

<input
type="number"
id="comisiones"
name="comisiones"
min="0">

<br><br>

<label for="horasExtras">
Horas extras:
</label>

<input
type="number"
id="horasExtras"
name="horasExtras"
min="0">

<br><br>

<label for="nivelRiesgo">
Nivel de riesgo:
</label>

<select
id="nivelRiesgo"
name="nivelRiesgo"
required>

<option value="">
Seleccione un nivel
</option>

<option value="minimo">Mínimo</option>
<option value="bajo">Bajo</option>
<option value="medio">Medio</option>
<option value="alto">Alto</option>
<option value="maximo">Máximo</option>

</select>

<br><br>

<button type="button" onclick="mostrarCalculos()">
    Calcular
</button>

</form>

<br>

<div id="resultado"></div>

    <script src="script.js"></script>

</body>
</html>
