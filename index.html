<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>JS Interno Básico</title>
</head>
<body>

    <form id="formularioLaboral"
<h1>Simulador de prestaciones laborales</h1>
<label for"nombre">Nombre:</label>
<input 
type="text"
id="nombre"
name="nombre"
minlength="1"
maxlength="100"
required>

<label for"edad">Edad:</label>
<input
type="number"
id="edad"
name="edad"
minlength="0"
maxlength="120"
required>

<label for"tipoDocumento">Tipo de documento:</label>

<select id ="Tipo de documento"
name="tipoDocumento"
required>
<option value="">selecciona el documento de identidad</option>
<option value="CC">CC</option>
<option value="TI">TI</option>
<option value="CE">CE</option>
<option value="PP">PP</option>
</select>

<label for="numeroDocumento">Numero de documento</label>
<input
type="text"
id="Número de documento"
name="numeroDocumento"
minlength="5"
maxlength="10"
required>

</form>

</body>
</html>
